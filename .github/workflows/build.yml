name: Build macOS App

# Triggers:
#   - on every push to `main` (your normal commits)
#   - manually via the "Run workflow" button in the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build universal .app + .dmg
    # Phase 8BB.1a hotfix — pinned to macos-15 (was: macos-latest).
    # The `macos-latest` label silently migrates to new runner images
    # which can break the Rust toolchain setup without warning. Phase 8BB.1
    # built successfully on May 13 against the macos-15 image. After that
    # date macos-latest rolled to a newer image where `cargo` was
    # effectively rustup-init, causing 'cargo metadata' to fail. Pinning
    # to macos-15 restores the known-good build environment.
    runs-on: macos-15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up Rust toolchain (with both macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # Phase 8BB.1a hotfix — surface cargo/rustc availability immediately.
      # If a future runner-image change ever breaks the Rust setup again,
      # this step fails clearly here instead of letting the error bury
      # itself inside `npx tauri build` output many lines later.
      - name: Verify Rust install
        run: cargo --version && rustc --version

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icons from source PNG
        run: npx tauri icon ./app-icon.png

      # Phase 8BB.1a-CI-v2 — surface PATH, cargo lookup, and Tauri CLI version
      # IMMEDIATELY before the build step that fails. Step 5 (Verify Rust install)
      # showed cargo works in a plain shell; step 9 (Build Tauri) fails with
      # cargo-actually-being-rustup-init. This step prints the exact state of
      # the environment at the failure point so we can identify whether:
      #   - some other cargo binary is shadowing $HOME/.cargo/bin/cargo on PATH
      #   - the installed Tauri CLI is a regressed version
      #   - rustup default toolchain isn't set
      # Always continues (|| true on the optional probes) so this step itself
      # never fails the build — it's purely diagnostic.
      - name: Pre-build diagnostics
        run: |
          echo "=== PATH (one per line) ==="
          echo "$PATH" | tr ':' '\n'
          echo ""
          echo "=== which cargo ==="
          which cargo || echo "(cargo not on PATH)"
          echo ""
          echo "=== ls -l \$(which cargo) ==="
          ls -l "$(which cargo)" 2>/dev/null || echo "(cargo not found to ls)"
          echo ""
          echo "=== cargo --version ==="
          cargo --version || echo "(cargo --version failed)"
          echo ""
          echo "=== rustup default ==="
          rustup default || echo "(no default toolchain set)"
          echo ""
          echo "=== \$HOME/.cargo/bin/cargo --version ==="
          "$HOME/.cargo/bin/cargo" --version || echo "(\$HOME/.cargo/bin/cargo not present)"
          echo ""
          echo "=== Tauri CLI version ==="
          npx tauri --version || true
          echo ""
          echo "=== CARGO_HOME / RUSTUP_HOME / RUSTUP_TOOLCHAIN ==="
          echo "CARGO_HOME=${CARGO_HOME:-(unset)}"
          echo "RUSTUP_HOME=${RUSTUP_HOME:-(unset)}"
          echo "RUSTUP_TOOLCHAIN=${RUSTUP_TOOLCHAIN:-(unset)}"

      # Phase 8BB.1a-CI-v2 — explicitly prepend $HOME/.cargo/bin to PATH for
      # this step. The dtolnay/rust-toolchain action adds it to GITHUB_PATH,
      # but evidence from the previous failed run shows that when Tauri build
      # internally invokes `cargo metadata` as a subprocess, that subprocess
      # finds a different cargo binary (effectively rustup-init from the
      # macOS runner's pre-installed Homebrew layout). This export forces
      # the right cargo to win the PATH race for this step's process tree.
      - name: Build Tauri universal macOS binary
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri build --target universal-apple-darwin

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Masterstone-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg installer
        uses: actions/upload-artifact@v4
        with:
          name: Masterstone-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

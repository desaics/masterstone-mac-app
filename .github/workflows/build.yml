name: Build macOS App

# Triggers:
#   - on every push to `main` (your normal commits)
#   - manually via the "Run workflow" button in the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build universal .app + .dmg
    runs-on: macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up Rust toolchain (with both macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icons from source PNG
        run: npx tauri icon ./app-icon.png

      - name: Build Tauri universal macOS binary
        run: npx tauri build --target universal-apple-darwin

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Masterstone-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg installer
        uses: actions/upload-artifact@v4
        with:
          name: Masterstone-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

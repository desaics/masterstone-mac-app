[package]
name = "masterstone"
version = "0.1.0"
description = "Masterstone CRM — Native macOS app"
authors = ["Masterstone LLP"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "masterstone_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Session 3 additions:
# - rusqlite with `bundled` feature compiles SQLite from source so we don't depend
#   on the macOS system SQLite version. Adds ~30s to first build, then cached.
# - dirs gives us cross-platform App Support folder resolution.
rusqlite = { version = "0.31", features = ["bundled"] }
dirs = "5"
